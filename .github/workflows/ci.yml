name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]" pytest-cov

      - name: Pytest + coverage badge
        env:
          AICOM_CI_ENFORCE_BADGE_SYNC: "1"
        run: bash scripts/ci_coverage_badge.sh -- tests/ -q --cov=aimarket_mcp
